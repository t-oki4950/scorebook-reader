<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Sample game 001 scorebook placeholder</title>
  <desc id="desc">A simple scorebook-like grid used to test the Streamlit review workflow without connecting an image recognition API.</desc>
  <rect x="0" y="0" width="1200" height="800" fill="#f8f6ef"/>
  <rect x="30" y="30" width="1140" height="740" fill="none" stroke="#333" stroke-width="3"/>
  <text x="50" y="62" font-family="Arial, sans-serif" font-size="22" fill="#111">SAMPLE GAME 001 - SCOREBOOK PLACEHOLDER</text>
  <text x="50" y="92" font-family="Arial, sans-serif" font-size="16" fill="#333">Use with examples/sample_game_001/provisional_reading.json</text>
  <g transform="translate(60 130)" font-family="Arial, sans-serif" font-size="16" fill="#111" stroke="#555">
    <rect x="0" y="0" width="1050" height="560" fill="none"/>
    <g stroke-width="1">
      <line x1="0" y1="0" x2="0" y2="560"/>
      <line x1="150" y1="0" x2="150" y2="560"/>
      <line x1="300" y1="0" x2="300" y2="560"/>
      <line x1="450" y1="0" x2="450" y2="560"/>
      <line x1="600" y1="0" x2="600" y2="560"/>
      <line x1="750" y1="0" x2="750" y2="560"/>
      <line x1="900" y1="0" x2="900" y2="560"/>
      <line x1="1050" y1="0" x2="1050" y2="560"/>
      <line x1="0" y1="0" x2="1050" y2="0"/>
      <line x1="0" y1="80" x2="1050" y2="80"/>
      <line x1="0" y1="160" x2="1050" y2="160"/>
      <line x1="0" y1="240" x2="1050" y2="240"/>
      <line x1="0" y1="320" x2="1050" y2="320"/>
      <line x1="0" y1="400" x2="1050" y2="400"/>
      <line x1="0" y1="480" x2="1050" y2="480"/>
      <line x1="0" y1="560" x2="1050" y2="560"/>
    </g>
    <g stroke="none">
      <text x="8" y="25">Batter 1</text><text x="8" y="52">K</text>
      <text x="8" y="105">Batter 2</text><text x="8" y="132">BB, run</text>
      <text x="8" y="185">Batter 3</text><text x="8" y="212">1H, WP</text>
      <text x="8" y="265">Batter 4</text><text x="8" y="292">LF 3B</text>
      <text x="8" y="345">Batter 5</text><text x="8" y="372">Squeeze T.O</text>
      <text x="8" y="425">Batter 6</text><text x="8" y="452">BB, LOB</text>
      <text x="8" y="505">Batter 7</text><text x="8" y="532">K, inning end</text>
    </g>
  </g>
</svg>
